name: Daily (KOR)

on:
  schedule:
    # 4시간마다 실행 (0, 4, 8, 12, 16, 20 UTC)
    # 코드가 실행 시점의 장 상태(장전/장중/장 마감 직후/장 마감 후)를 자동 판단
    - cron: '0 */4 * * 1-5'
  workflow_dispatch: # 수동 실행 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 튜닝 결과 커밋을 위해 필요

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run Recommendation (KOR) and Send Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
        run: python recommend.py kor --slack

      - name: Commit and Push updated config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/kor.json
          git add state/last_recommendation_kor.json || true
          git status
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(kor): update optimal parameters [skip ci]" && git pull --rebase origin main && git push)
