name: Daily Index Switching (KOR)

on:
  schedule:
    # 한국 장 기준 30분 후(09:30 KST = 00:30 UTC), 30분 전(15:00 KST = 06:00 UTC)
    # 목표 시각 주변을 더 자주 실행하고 recommend.py가 정확한 슬롯만 통과시킴
    - cron: '*/5 0 * * 1-5'
    - cron: '0,5,10,15 1 * * 1-5'
    - cron: '15,20,25,30,35,40,45,50,55 5 * * 1-5'
    - cron: '*/5 6 * * 1-5'
  workflow_dispatch: # 수동 실행 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 튜닝 결과 커밋을 위해 필요

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run Recommendation (KOR) and Send Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
        run: python recommend.py kor --slack --auto

      - name: Commit and Push updated config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/kor.json
          git add state/last_recommendation_kor.json || true
          git add state/last_auto_alert_kor.json || true
          git status
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(kor): update optimal parameters [skip ci]" && git pull --rebase origin main && git push)
